apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: vulcan
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      containers:
        - name: prometheus
          image: ghcr.io/sejall0112/vulcanpaas-prometheus:latest
          ports:
            - containerPort: 9090
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: vulcan
spec:
  selector:
    app: prometheus
  ports:
    - port: 9090
      targetPort: 9090
