apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: vulcan
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      containers:
        - name: grafana
          image: ghcr.io/sejall0112/vulcanpaas-grafana:latest
          ports:
            - containerPort: 3000
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: vulcan
spec:
  selector:
    app: grafana
  ports:
    - port: 3000
      targetPort: 3000
