apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: vulcan
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
        - name: api
          image: ghcr.io/sejall0112/vulcanpaas-api:latest
          ports:
            - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: vulcan
spec:
  selector:
    app: api
  ports:
    - port: 8080
      targetPort: 8080
