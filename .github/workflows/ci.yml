name: VulcanPaaS CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/sejall0112/vulcanpaas

jobs:

  lint-and-audit:
    name: Lint and Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install API dependencies
        working-directory: services/api
        run: npm ci

      - name: Run npm audit (API)
        working-directory: services/api
        run: |
          npm audit --audit-level=high
          if [ $? -ne 0 ]; then
            echo "ERROR: npm audit found HIGH or CRITICAL vulnerabilities"
            exit 1
          fi

      - name: Install Frontend dependencies
        working-directory: services/frontend
        run: npm ci

      - name: Run npm audit (Frontend)
        working-directory: services/frontend
        run: |
          npm audit --audit-level=high
          if [ $? -ne 0 ]; then
            echo "ERROR: npm audit found HIGH or CRITICAL vulnerabilities"
            exit 1
          fi



  build-and-push:
    name: Build and Push to GHCR
    runs-on: ubuntu-latest
    needs: lint-and-audit

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set tag
        id: tag
        run: echo "IMAGE_TAG=${GITHUB_SHA::8}" >> $GITHUB_OUTPUT


      - name: Build API
        uses: docker/build-push-action@v5
        with:
          context: ./services/api
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}-api:${{ steps.tag.outputs.IMAGE_TAG }}
            ${{ env.IMAGE_PREFIX }}-api:latest


      - name: Build nginx
        uses: docker/build-push-action@v5
        with:
          context: ./services/nginx
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}-nginx:${{ steps.tag.outputs.IMAGE_TAG }}
            ${{ env.IMAGE_PREFIX }}-nginx:latest


      - name: Build frontend
        uses: docker/build-push-action@v5
        with:
          context: ./services/frontend
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}-frontend:${{ steps.tag.outputs.IMAGE_TAG }}
            ${{ env.IMAGE_PREFIX }}-frontend:latest


      - name: Build prometheus
        uses: docker/build-push-action@v5
        with:
          context: ./services/prometheus
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}-prometheus:${{ steps.tag.outputs.IMAGE_TAG }}
            ${{ env.IMAGE_PREFIX }}-prometheus:latest


      - name: Build grafana
        uses: docker/build-push-action@v5
        with:
          context: ./services/grafana
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}-grafana:${{ steps.tag.outputs.IMAGE_TAG }}
            ${{ env.IMAGE_PREFIX }}-grafana:latest


  trivy-scan:
    name: Trivy Security Scan
    runs-on: ubuntu-latest
    needs: build-and-push

    permissions:
      contents: read
      packages: read

    steps:

      - uses: actions/checkout@v4

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}


      - name: Scan API
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_PREFIX }}-api:latest
          exit-code: '1'
          severity: HIGH,CRITICAL
          ignore-unfixed: true


      - name: Scan nginx
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_PREFIX }}-nginx:latest
          exit-code: '1'
          severity: CRITICAL
          ignore-unfixed: true


      - name: Scan frontend
  uses: aquasecurity/trivy-action@master
  with:
    image-ref: ${{ env.IMAGE_PREFIX }}-frontend:latest
    exit-code: '1'
    severity: CRITICAL
    ignore-unfixed: true


      - name: Scan prometheus
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_PREFIX }}-prometheus:latest
          exit-code: '1'
          severity: CRITICAL
          ignore-unfixed: true


      - name: Scan grafana
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_PREFIX }}-grafana:latest
          exit-code: '1'
          severity: CRITICAL
          ignore-unfixed: true