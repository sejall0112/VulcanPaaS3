name: VulcanPaaS CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/sejall0112/vulcanpaas

jobs:

  lint-and-audit:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: API install
        working-directory: services/api
        run: npm ci

      - name: API audit
        working-directory: services/api
        run: npm audit --audit-level=high

      - name: Frontend install
        working-directory: services/frontend
        run: npm ci

      - name: Frontend audit
        working-directory: services/frontend
        run: npm audit --audit-level=high



  build-and-push:
    runs-on: ubuntu-latest
    needs: lint-and-audit

    permissions:
      contents: read
      packages: write

    steps:

      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build API
        uses: docker/build-push-action@v5
        with:
          context: ./services/api
          push: true
          tags: ghcr.io/sejall0112/vulcanpaas-api:latest

      - name: Build nginx
        uses: docker/build-push-action@v5
        with:
          context: ./services/nginx
          push: true
          tags: ghcr.io/sejall0112/vulcanpaas-nginx:latest

      - name: Build frontend
        uses: docker/build-push-action@v5
        with:
          context: ./services/frontend
          push: true
          tags: ghcr.io/sejall0112/vulcanpaas-frontend:latest

      - name: Build prometheus
        uses: docker/build-push-action@v5
        with:
          context: ./services/prometheus
          push: true
          tags: ghcr.io/sejall0112/vulcanpaas-prometheus:latest

      - name: Build grafana
        uses: docker/build-push-action@v5
        with:
          context: ./services/grafana
          push: true
          tags: ghcr.io/sejall0112/vulcanpaas-grafana:latest
          
    trivy-scan:
    runs-on: ubuntu-latest
    needs: build-and-push

    permissions:
      contents: read
      packages: read

    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Scan API
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/sejall0112/vulcanpaas-api:latest
          exit-code: '1'
          severity: HIGH,CRITICAL
          ignore-unfixed: true

      - name: Scan nginx
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/sejall0112/vulcanpaas-nginx:latest
          exit-code: '1'
          severity: CRITICAL
          ignore-unfixed: true

      - name: Scan frontend
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/sejall0112/vulcanpaas-frontend:latest
          exit-code: '1'
          severity: CRITICAL
          ignore-unfixed: true

      - name: Scan prometheus
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/sejall0112/vulcanpaas-prometheus:latest
          severity: CRITICAL
          ignore-unfixed: true

      - name: Scan grafana
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/sejall0112/vulcanpaas-grafana:latest
          severity: CRITICAL
          ignore-unfixed: true