name: VulcanPaaS CI

on:
  push:
    branches: [main]

env:
  IMAGE_PREFIX: ghcr.io/sejall0112/vulcanpaas

jobs:

  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build api
        uses: docker/build-push-action@v5
        with:
          context: ./services/api
          push: true
          tags: ghcr.io/sejall0112/vulcanpaas-api:latest

      - name: Build nginx
        uses: docker/build-push-action@v5
        with:
          context: ./services/nginx
          push: true
          tags: ghcr.io/sejall0112/vulcanpaas-nginx:latest

      - name: Build frontend
        uses: docker/build-push-action@v5
        with:
          context: ./services/frontend
          push: true
          tags: ghcr.io/sejall0112/vulcanpaas-frontend:latest

      - name: Build prometheus
        uses: docker/build-push-action@v5
        with:
          context: ./services/prometheus
          push: true
          tags: ghcr.io/sejall0112/vulcanpaas-prometheus:latest

      - name: Build grafana
        uses: docker/build-push-action@v5
        with:
          context: ./services/grafana
          push: true
          tags: ghcr.io/sejall0112/vulcanpaas-grafana:latest


  scan:
    runs-on: ubuntu-latest
    needs: build

    permissions:
      contents: read
      packages: read

    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Scan api
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/sejall0112/vulcanpaas-api:latest
          exit-code: '1'
          severity: CRITICAL
          ignore-unfixed: true

      - name: Scan nginx
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/sejall0112/vulcanpaas-nginx:latest
          severity: CRITICAL
          ignore-unfixed: true

      - name: Scan frontend
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/sejall0112/vulcanpaas-frontend:latest
          severity: CRITICAL
          ignore-unfixed: true

      - name: Scan prometheus
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/sejall0112/vulcanpaas-prometheus:latest
          severity: CRITICAL
          ignore-unfixed: true

      - name: Scan grafana
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/sejall0112/vulcanpaas-grafana:latest
          severity: CRITICAL
          ignore-unfixed: true


  ai-review:
    runs-on: ubuntu-latest
    needs: scan

    steps:
      - uses: actions/checkout@v4

      - name: AI Review (mock)
        run: |
          echo "Running AI review..."
          echo "Security check passed"
          echo OK

  deploy:
    runs-on: ubuntu-latest
    needs: ai-review

    steps:
      - uses: actions/checkout@v4


      - name: Save deploy history
        run: |
          echo "{ 
            \"time\": \"$(date)\",
            \"version\": \"latest\"
          }" >> deploy-history.json


      - name: Install docker compose
        run: |
          sudo apt-get update
          sudo apt-get install -y docker-compose


      - name: Create env file
        run: |
          echo "NODE_ENV=production" >> .env
          echo "PORT=3000" >> .env
          echo "API_URL=http://api:3000" >> .env


      - name: Start stack
        run: |
          docker-compose up -d


      - name: Wait for services
        run: |
          echo "Waiting for containers..."
          sleep 25
          docker ps


      - name: Smoke test API
        run: |
          for i in {1..5}; do
            curl http://localhost:3000/health && break
            echo retry...
            sleep 5
          done


      - name: Smoke test nginx
        run: |
          for i in {1..5}; do
            curl http://localhost/nginx-health && break
            echo retry...
            sleep 5
          done


      - name: Smoke test metrics
        run: |
          for i in {1..5}; do
            curl http://localhost:3000/metrics && break
            echo retry...
            sleep 5
          done


      - name: Done
        run: echo "DEPLOY OK"