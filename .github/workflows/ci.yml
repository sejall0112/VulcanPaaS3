name: VulcanPaaS CI

on:
  push:
    branches: [main]

env:
  IMAGE_PREFIX: ghcr.io/sejall0112/vulcanpaas

jobs:

  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build api
        uses: docker/build-push-action@v5
        with:
          context: ./services/api
          push: true
          tags: ghcr.io/sejall0112/vulcanpaas-api:latest

      - name: Build nginx
        uses: docker/build-push-action@v5
        with:
          context: ./services/nginx
          push: true
          tags: ghcr.io/sejall0112/vulcanpaas-nginx:latest

      - name: Build frontend
        uses: docker/build-push-action@v5
        with:
          context: ./services/frontend
          push: true
          tags: ghcr.io/sejall0112/vulcanpaas-frontend:latest

      - name: Build prometheus
        uses: docker/build-push-action@v5
        with:
          context: ./services/prometheus
          push: true
          tags: ghcr.io/sejall0112/vulcanpaas-prometheus:latest

      - name: Build grafana
        uses: docker/build-push-action@v5
        with:
          context: ./services/grafana
          push: true
          tags: ghcr.io/sejall0112/vulcanpaas-grafana:latest


  scan:
    runs-on: ubuntu-latest
    needs: build

    permissions:
      contents: read
      packages: read

    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Scan api
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/sejall0112/vulcanpaas-api:latest
          exit-code: '1'
          severity: HIGH,CRITICAL
          ignore-unfixed: true

      - name: Scan nginx
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/sejall0112/vulcanpaas-nginx:latest
          exit-code: '1'
          severity: CRITICAL
          ignore-unfixed: true

      - name: Scan frontend
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/sejall0112/vulcanpaas-frontend:latest
          exit-code: '1'
          severity: CRITICAL
          ignore-unfixed: true

      - name: Scan prometheus
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/sejall0112/vulcanpaas-prometheus:latest
          severity: CRITICAL
          ignore-unfixed: true

      - name: Scan grafana
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/sejall0112/vulcanpaas-grafana:latest
          severity: CRITICAL
          ignore-unfixed: true


  ai-review:
    runs-on: ubuntu-latest
    needs: scan

    steps:
      - uses: actions/checkout@v4

      - name: AI Review (mock)
        run: |
          echo "Running AI review..."
          echo "Security review passed"
          echo OK
  
    deploy:
    runs-on: ubuntu-latest
    needs: ai-review

    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy containers
        run: |
          docker compose pull
          docker compose up -d